<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador — Burger Master</title>
    <link rel="stylesheet" href="/css/registro.css">
</head>
<body>

    <header>
        <nav>
            <strong><a href="/index.html">Burger Master</a></strong>
        </nav>
    </header>

    <main>
        <section>
            <form id="formulario-login-admin" novalidate>
                <h2>Acceso Administrador</h2>

                <div class="datos-entrada">
                    <label for="admin-username">Usuario</label>
                    <input type="text" id="admin-username" placeholder="Usuario administrador" required>
                </div>

                <div class="datos-entrada">
                    <label for="admin-password">Contraseña</label>
                    <input type="password" id="admin-password" required>
                    <div class="mostrar-contrasena">
                        <input type="checkbox" id="mostrar-login-admin">
                        <label for="mostrar-login-admin">Mostrar contraseña</label>
                    </div>
                </div>

                <p id="mensaje-login-admin" class="mensaje-feedback"></p>

                <button type="submit">Ingresar</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Burger Master &copy; 2026</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
