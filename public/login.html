<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/registro.css">
    <title>Iniciar Sesión — Burger Master</title>
</head>
<body>

    <header>
        <nav>
            <strong><a href="/index.html">Burger Master</a></strong>
            <ul>
                <li><a href="/index.html#directorio">Directorio</a></li>
                <li><a href="/ranking.html">Ranking</a></li>
                <li><a href="/mapa.html">Mapa</a></li>
            </ul>
            <div id="nav-invitado">
                <a href="/login.html" class="btn-primary" style="display: none;">Ingresar</a>
                <a href="/registro.html" style="display: none;">Registrarse</a>
            </div>
        </nav>
    </header>

    <main>
        <section>
            <form id="formulario-registro" novalidate>
                <h2>Iniciar Sesión</h2>

                <div class="datos-entrada">
                    <label for="login-username">Nombre de Usuario</label>
                    <input type="text" id="login-username" placeholder="Tu nombre de usuario" required>
                    <span class="mensaje-error">Ingresa tu usuario</span>
                </div>

                <div class="datos-entrada">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" required>
                    <span class="mensaje-error">Ingresa tu contraseña</span>
                    
                    <div class="mostrar-contrasena">
                        <input type="checkbox" id="mostrar-login">
                        <label for="mostrar-login">Mostrar contraseña</label>
                    </div>
                </div>

                <p id="mensaje-login" class="mensaje-feedback"></p>

                <button type="submit">Iniciar Sesión</button>

                <p class="link-cambio">¿No tienes cuenta? <a href="/registro.html">Regístrate</a></p>
            </form>
        </section>
    </main>

    <footer>
        <p>Burger Master &copy; 2026</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
